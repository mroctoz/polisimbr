<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pátria - Executivo & População</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background: url('https://images.unsplash.com/photo-1518005020951-eccb494ad742?q=80&w=2665') no-repeat center fixed; background-size: cover; color: #0f172a; font-family: 'Segoe UI', sans-serif; }
        .aero-panel { background: linear-gradient(180deg, rgba(245,250,255,0.85) 0%, rgba(255,255,255,0.6) 100%); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 4px 16px rgba(0,0,0,0.08), inset 0 2px 0 #fff; border-radius: 16px; }
        .aero-btn { background: linear-gradient(180deg, #b0d4ff 0%, #89f7fe 49%, #4facfe 50%, #00a8ff 100%); border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 2px 4px #fff; border-radius: 99px; color: #fff; font-weight: bold; text-shadow: 0px 1px 2px rgba(0,0,0,0.4); padding: 10px 20px; transition: all 0.2s; cursor: pointer; }
        .aero-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .progress-bg { background: rgba(255,255,255,0.5); border-radius: 99px; overflow: hidden; height: 12px; border: 1px solid rgba(255,255,255,0.8); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #43e97b, #38f9d7); box-shadow: inset 0 2px 4px rgba(255,255,255,0.6); transition: width 0.5s; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-radius: 99px; margin-bottom: 8px; font-weight: bold; color: #334155; background: rgba(255,255,255,0.4); border: 1px solid #fff; transition: 0.3s; text-decoration: none; }
        .nav-link.active { background: linear-gradient(90deg, #4facfe, #00f2fe); color: white; transform: scale(1.05); shadow: 0 4px 10px rgba(0,150,255,0.3); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const Icon = ({n}) => <i className={`fas fa-${n}`}></i>;

        const INITIAL_STATE = {
            turn: 1, year: 2026,
            player: null,
            economy: { gdp: 2.0, inflation: 4.5, unemployment: 8.0, selic: 10.5, budget: 300, ir: 27.5, iva: 20 },
            society: { approval: 50, protest: 10, health: 50, education: 50, security: 50, infra: 50 },
            diplomacy: { us: 50, china: 50, mercosul: 50, treaties: [], sanctions: [] },
            congress:[
                {id: 'MDB', sigla: 'MDB', seats: 100, align: 50, color: '#008b8b'},
                {id: 'PL', sigla: 'PL', seats: 90, align: 30, color: '#000080'},
                {id: 'PT', sigla: 'PT', seats: 80, align: 30, color: '#dc143c'},
                {id: 'CENT', sigla: 'CENTRÃO', seats: 243, align: 50, color: '#888'}
            ],
            judiciary: { stfAlignment: 50, corruptionEscandals: 0, judgesAppointed: 0 },
            ministers: { economy: null, justice: null, health: null },
            laws: [], aiLaws: [], notifications:[]
        };

        const App = () => {
            const [state, setState] = useState(() => JSON.parse(localStorage.getItem('patria_state')) || INITIAL_STATE);
            useEffect(() => { localStorage.setItem('patria_state', JSON.stringify(state)); }, [state]);

            const startGame = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                let ns = {...state, player: { name: fd.get('name'), party: fd.get('party'), ideology: fd.get('ideo'), color: fd.get('color') }};
                ns.congress.unshift({id: 'PLAYER', sigla: fd.get('party'), seats: 85, align: 100, color: fd.get('color')});
                ns.congress[4].seats -= 85;
                setState(ns);
            };

            const appointMinister = (role, name, bonus) => {
                if(state.economy.budget < 10) return alert("Custa R$ 10 Bi para nomeação.");
                setState(s => ({...s, economy: {...s.economy, budget: s.economy.budget-10}, ministers: {...s.ministers, [role]: {name, bonus}}}));
            };

            const investArea = (area) => {
                if(state.economy.budget < 20) return alert("Caixa insuficiente (R$ 20Bi).");
                setState(s => {
                    let ns = {...s};
                    ns.economy.budget -= 20;
                    ns.society[area] = Math.min(100, ns.society[area] + 15);
                    ns.society.approval += 2;
                    return ns;
                });
            };

            const advanceTurn = () => {
                setState(s => {
                    let ns = {...s};
                    ns.turn += 1;
                    if(ns.turn % 12 === 1) ns.year += 1;
                    ns.economy.budget += 50 + (ns.economy.gdp * 5); // Arrecadação
                    ns.society.approval += (ns.economy.gdp > 2 ? 1 : -1) - (ns.economy.inflation > 6 ? 2 : 0);
                    // Ministérios bônus
                    if(ns.ministers.economy) { ns.economy.inflation -= 0.2; ns.economy.gdp += 0.1; }
                    if(ns.ministers.health) ns.society.health += 1;
                    if(ns.ministers.justice) ns.judiciary.corruptionEscandals = Math.max(0, ns.judiciary.corruptionEscandals - 1);
                    
                    if(ns.turn % 48 >= 44) window.location.href = 'campanha.html'; // Tempo de Eleição
                    return ns;
                });
            };

            if(!state.player) return (
                <div className="flex h-full items-center justify-center p-6">
                    <form onSubmit={startGame} className="aero-panel p-8 w-full max-w-md text-center">
                        <Icon n="flag" /> <h1 className="text-3xl font-bold mb-6 mt-2">Criar Presidente</h1>
                        <input required name="name" placeholder="Seu Nome" className="w-full mb-3 p-2 rounded-lg border"/>
                        <input required name="party" placeholder="Sigla do Partido (Ex: PDS)" className="w-full mb-3 p-2 rounded-lg border"/>
                        <select name="ideo" className="w-full mb-3 p-2 rounded-lg border"><option>Centro</option><option>Direita</option><option>Esquerda</option></select>
                        <input type="color" name="color" className="w-full mb-4 h-10 rounded-lg cursor-pointer"/>
                        <button className="aero-btn w-full">Assumir Governo</button>
                    </form>
                </div>
            );

            return (
                <div className="flex h-full p-4 gap-4">
                    <aside className="w-64 aero-panel flex flex-col p-4">
                        <div className="text-center mb-6">
                            <h2 className="text-xl font-bold text-slate-800">{state.player.name}</h2>
                            <p className="text-sm font-bold" style={{color: state.player.color}}>{state.player.party}</p>
                        </div>
                        <nav className="flex-1">
                            <a href="index.html" className="nav-link active"><Icon n="home"/> Executivo</a>
                            <a href="legislativo.html" className="nav-link"><Icon n="gavel"/> Legislativo & STF</a>
                            <a href="economia.html" className="nav-link"><Icon n="chart-line"/> Economia & Mundo</a>
                            <a href="campanha.html" className="nav-link"><Icon n="bullhorn"/> Eleições</a>
                        </nav>
                        <div className="text-center">
                            <p className="text-sm font-bold mb-2">Turno {state.turn} | Ano {state.year}</p>
                            <button onClick={advanceTurn} className="aero-btn w-full"><Icon n="forward"/> Avançar Mês</button>
                        </div>
                    </aside>
                    
                    <main className="flex-1 overflow-y-auto scrollbar-hide flex flex-col gap-4">
                        <div className="grid grid-cols-3 gap-4">
                            <div className="aero-panel p-5"><h3 className="font-bold"><Icon n="thumbs-up"/> Aprovação</h3><p className="text-4xl font-extrabold text-blue-500 mt-2">{state.society.approval.toFixed(1)}%</p></div>
                            <div className="aero-panel p-5"><h3 className="font-bold"><Icon n="wallet"/> Orçamento</h3><p className="text-4xl font-extrabold text-green-500 mt-2">R$ {state.economy.budget.toFixed(0)} Bi</p></div>
                            <div className="aero-panel p-5"><h3 className="font-bold text-red-600"><Icon n="fire"/> Risco Impeachment</h3><p className="text-4xl font-extrabold text-red-500 mt-2">{state.society.protest.toFixed(1)}%</p></div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 flex-1">
                            <div className="aero-panel p-5">
                                <h3 className="text-lg font-bold mb-4 border-b pb-2"><Icon n="users-cog"/> Gabinete de Ministros</h3>
                                <div className="space-y-4">
                                    {['economy', 'health', 'justice'].map(m => (
                                        <div key={m} className="bg-white/50 p-3 rounded-lg border shadow-sm flex justify-between items-center">
                                            <div><p className="font-bold text-slate-700 capitalize">Ministério: {m}</p><p className="text-xs text-slate-500">{state.ministers[m]?.name || 'Vago'}</p></div>
                                            {!state.ministers[m] && <button onClick={()=>appointMinister(m, 'Especialista Técnico', 'bonus')} className="text-xs bg-blue-500 text-white px-3 py-1 rounded-full">Nomear (R$ 10Bi)</button>}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="aero-panel p-5">
                                <h3 className="text-lg font-bold mb-4 border-b pb-2"><Icon n="city"/> Políticas Públicas & Demandas</h3>
                                <div className="space-y-4">
                                    {['health', 'education', 'infra', 'security'].map(area => (
                                        <div key={area}>
                                            <div className="flex justify-between text-xs font-bold mb-1 uppercase"><span>{area}</span><span>{state.society[area]} / 100</span></div>
                                            <div className="flex gap-2 items-center">
                                                <div className="flex-1 progress-bg"><div className="progress-fill" style={{width: `${state.society[area]}%`}}></div></div>
                                                <button onClick={()=>investArea(area)} className="text-[10px] bg-green-500 text-white px-2 py-1 rounded shadow">+ Inv</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
